<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Motion Multi-Camera Panel</title>
  <style>
    :root { --bg:#0f172a; --card:#111827; --card2:#1e293b; --text:#e5e7eb; --muted:#94a3b8; --accent:#22c55e; --accent2:#38bdf8; --danger:#ef4444; --warning:#f59e0b; --border:#334155; }
    body { font-family:Arial,sans-serif; margin:0; padding:20px; background:var(--bg); color:var(--text); }
    h1 { margin:0 0 12px 0; }
    .tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .tab { padding:8px 12px; border:1px solid var(--border); border-radius:999px; cursor:pointer; background:#0b1220; }
    .tab.active { background:var(--accent2); color:#08111d; font-weight:bold; }
    .layout { display:grid; grid-template-columns:2fr 1fr; gap:20px; align-items:start; }
    .card { background:linear-gradient(180deg,var(--card),var(--card2)); border:1px solid var(--border); border-radius:14px; padding:16px; }
    img { width:100%; border-radius:12px; border:1px solid var(--border); background:black; }
    .status-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
    .status-item { border:1px solid var(--border); border-radius:10px; padding:10px; }
    .label { color:var(--muted); font-size:13px; margin-bottom:6px; }
    .value { font-size:15px; font-weight:bold; word-break:break-word; }
    .green{color:var(--accent);} .red{color:var(--danger);} .yellow{color:var(--warning);} .blue{color:var(--accent2);}
    input, select, button { margin-top:6px; padding:10px; font-size:14px; width:100%; box-sizing:border-box; border-radius:10px; border:1px solid var(--border); background:#0b1220; color:var(--text); }
    button { cursor:pointer; background:var(--accent2); color:#08111d; font-weight:bold; border:none; }
    pre { background:#020617; color:#d1fae5; padding:12px; font-size:13px; overflow:auto; min-height:220px; border-radius:12px; border:1px solid var(--border); }
    .inline { display:flex; gap:8px; }
  </style>
</head>
<body>
  <h1>Motion Detection: Multi Camera</h1>
  <div class="tabs" id="cameraTabs"></div>

  {% if setup_mode %}
  <div class="card" style="margin-bottom:16px;">
    <h3>Setup: добавить камеру</h3>
    <div class="inline">
      <input id="new_camera_name" type="text" placeholder="Имя камеры">
      <button onclick="addCamera()">+ Добавить</button>
    </div>
  </div>
  {% endif %}

  <div class="layout">
    <div class="card">
      <h2>Video</h2>
      <label for="mode">Display mode</label>
      <select id="mode" onchange="updateVideoMode()">
        <option value="debug">DEBUG</option>
        <option value="raw">RAW</option>
        <option value="mask">MASK</option>
        <option value="thresh">THRESH</option>
      </select>
      <br><br>
      <img id="video" src="" alt="video stream">
      <div class="status-grid">
        <div class="status-item"><div class="label">Time</div><div class="value" id="current_time">-</div></div>
        <div class="status-item"><div class="label">RTSP</div><div class="value blue" id="rtsp_url">-</div></div>
        <div class="status-item"><div class="label">GPIO enabled</div><div class="value" id="gpio_enabled_status">-</div></div>
        <div class="status-item"><div class="label">GPIO state</div><div class="value" id="gpio_state">-</div></div>
        <div class="status-item"><div class="label">Event status</div><div class="value" id="event_status">-</div></div>
        <div class="status-item"><div class="label">Last event time</div><div class="value" id="last_event_time">-</div></div>
      </div>
    </div>

    <div class="card">
      <h2>Settings</h2>
      <label>RTSP URL <input id="rtsp_url_input" type="text"></label>
      <label>Min area <input id="min_area" type="number"></label>
      <label>Motion frames threshold <input id="motion_frames_threshold" type="number"></label>
      <label>Var threshold <input id="var_threshold" type="number"></label>
      <label>Event delay (sec) <input id="event_delay" type="number"></label>
      <label>Blur kernel <input id="blur_kernel" type="number"></label>
      <label><input id="gpio_enabled" type="checkbox" style="width:auto;"> Enable GPIO output</label>
      <label>GPIO pin (BCM) <input id="gpio_pin" type="number"></label>
      <label>GPIO hold seconds <input id="gpio_hold_seconds" type="number" step="0.1"></label>
      <button onclick="saveConfig()">Save config</button>
      <button onclick="loadConfig()">Reload config</button>
    </div>
  </div>

  <div class="card" style="margin-top:20px;">
    <h2>Logs</h2>
    <pre id="logs">loading...</pre>
  </div>

<script>
let currentCameraId = null;
let cameras = [];

async function fetchCameras() {
  const res = await fetch('/api/cameras');
  const data = await res.json();
  cameras = data.cameras || [];

  if (!currentCameraId) currentCameraId = data.active_camera;
  if (!cameras.find(c => c.id === currentCameraId) && cameras.length) currentCameraId = cameras[0].id;

  const tabs = document.getElementById('cameraTabs');
  tabs.innerHTML = '';
  cameras.forEach(camera => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (camera.id === currentCameraId ? ' active' : '');
    btn.textContent = camera.name;
    btn.onclick = () => switchCamera(camera.id);
    tabs.appendChild(btn);
  });
}

async function switchCamera(cameraId) {
  currentCameraId = cameraId;
  await fetch('/api/active_camera', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ camera_id: cameraId })
  });
  updateVideoMode();
  await loadConfig();
  await fetchStatus();
  await fetchCameras();
}

async function fetchStatus() {
  if (!currentCameraId) return;
  const res = await fetch('/api/status?camera_id=' + encodeURIComponent(currentCameraId));
  const data = await res.json();
  if (data.error) return;

  document.getElementById('current_time').textContent = data.current_time;
  document.getElementById('rtsp_url').textContent = data.rtsp_display || data.rtsp_url;
  document.getElementById('gpio_enabled_status').textContent = data.gpio_enabled ? 'ENABLED' : 'DISABLED';
  document.getElementById('gpio_enabled_status').className = 'value ' + (data.gpio_enabled ? 'green' : 'yellow');
  document.getElementById('gpio_state').textContent = data.gpio_state;
  document.getElementById('gpio_state').className = 'value ' + (data.gpio_state === 'HIGH' ? 'green' : 'yellow');
  document.getElementById('event_status').textContent = data.event_status ? 'TRUE' : 'FALSE';
  document.getElementById('event_status').className = 'value ' + (data.event_status ? 'green' : 'red');
  document.getElementById('last_event_time').textContent = data.last_event_time;
  document.getElementById('logs').textContent = (data.logs || []).join('\n');
}

async function loadConfig() {
  if (!currentCameraId) return;
  const res = await fetch('/api/config?camera_id=' + encodeURIComponent(currentCameraId));
  const data = await res.json();
  if (data.error) return;

  document.getElementById('rtsp_url_input').value = data.rtsp_url;
  document.getElementById('min_area').value = data.min_area;
  document.getElementById('motion_frames_threshold').value = data.motion_frames_threshold;
  document.getElementById('var_threshold').value = data.var_threshold;
  document.getElementById('event_delay').value = data.event_delay;
  document.getElementById('blur_kernel').value = data.blur_kernel;
  document.getElementById('gpio_enabled').checked = data.gpio_enabled;
  document.getElementById('gpio_pin').value = data.gpio_pin;
  document.getElementById('gpio_hold_seconds').value = data.gpio_hold_seconds;
}

async function saveConfig() {
  if (!currentCameraId) return;
  const payload = {
    rtsp_url: document.getElementById('rtsp_url_input').value,
    min_area: parseInt(document.getElementById('min_area').value, 10),
    motion_frames_threshold: parseInt(document.getElementById('motion_frames_threshold').value, 10),
    var_threshold: parseInt(document.getElementById('var_threshold').value, 10),
    event_delay: parseInt(document.getElementById('event_delay').value, 10),
    blur_kernel: parseInt(document.getElementById('blur_kernel').value, 10),
    gpio_enabled: document.getElementById('gpio_enabled').checked,
    gpio_pin: parseInt(document.getElementById('gpio_pin').value, 10),
    gpio_hold_seconds: parseFloat(document.getElementById('gpio_hold_seconds').value),
    gpio_active_high: true
  };

  const res = await fetch('/api/config?camera_id=' + encodeURIComponent(currentCameraId), {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
  });
  const data = await res.json();
  alert('Saved: ' + JSON.stringify(data));
}

async function addCamera() {
  const name = document.getElementById('new_camera_name').value.trim();
  const res = await fetch('/api/cameras', {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name })
  });
  const data = await res.json();
  if (data.error) {
    alert(data.error);
    return;
  }
  currentCameraId = data.id;
  await fetchCameras();
  await switchCamera(currentCameraId);
}

function updateVideoMode() {
  if (!currentCameraId) return;
  const mode = document.getElementById('mode').value;
  document.getElementById('video').src = '/video?camera_id=' + encodeURIComponent(currentCameraId) + '&mode=' + mode + '&_ts=' + Date.now();
}

(async function init(){
  await fetchCameras();
  await loadConfig();
  updateVideoMode();
  await fetchStatus();
  setInterval(fetchStatus, 1000);
})();
</script>
</body>
</html>
