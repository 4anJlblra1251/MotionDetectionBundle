<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Motion Debug Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f3f3f3;
        }

        h1 {
            margin-bottom: 10px;
        }

        .layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .video-block, .controls-block {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }

        img {
            max-width: 960px;
            width: 100%;
            border: 1px solid #ccc;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, select, button {
            margin-top: 4px;
            padding: 6px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            margin-top: 12px;
        }

        pre {
            background: #111;
            color: #0f0;
            padding: 10px;
            font-size: 13px;
            overflow: auto;
            min-height: 220px;
        }
    </style>
</head>
<body>
    <h1>Отладка детекции движения</h1>

    <div class="layout">
        <div class="video-block" style="flex: 2;">
            <label for="mode">Режим отображения</label>
            <select id="mode" onchange="updateVideoMode()">
                <option value="debug">DEBUG</option>
                <option value="raw">RAW</option>
                <option value="mask">MASK</option>
                <option value="thresh">THRESH</option>
            </select>

            <br><br>
            <img id="video" src="/video?mode=debug" alt="video stream">

            <h3>Текущий статус</h3>
            <pre id="status">loading...</pre>
        </div>

        <div class="controls-block" style="flex: 1; min-width: 320px;">
            <h3>Параметры</h3>

            <label>RTSP URL
                <input id="rtsp_url" type="text">
            </label>

            <label>Min area
                <input id="min_area" type="number">
            </label>

            <label>Motion frames threshold
                <input id="motion_frames_threshold" type="number">
            </label>

            <label>Var threshold
                <input id="var_threshold" type="number">
            </label>

            <label>Event delay (sec)
                <input id="event_delay" type="number">
            </label>

            <label>Blur kernel
                <input id="blur_kernel" type="number">
            </label>

            <button onclick="saveConfig()">Сохранить конфиг</button>
            <button onclick="loadConfig()">Перечитать конфиг</button>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('status').textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('status').textContent = 'Ошибка чтения status: ' + e;
            }
        }

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();

                document.getElementById('rtsp_url').value = data.rtsp_url;
                document.getElementById('min_area').value = data.min_area;
                document.getElementById('motion_frames_threshold').value = data.motion_frames_threshold;
                document.getElementById('var_threshold').value = data.var_threshold;
                document.getElementById('event_delay').value = data.event_delay;
                document.getElementById('blur_kernel').value = data.blur_kernel;
            } catch (e) {
                alert('Ошибка загрузки config: ' + e);
            }
        }

        async function saveConfig() {
            const payload = {
                rtsp_url: document.getElementById('rtsp_url').value,
                min_area: parseInt(document.getElementById('min_area').value, 10),
                motion_frames_threshold: parseInt(document.getElementById('motion_frames_threshold').value, 10),
                var_threshold: parseInt(document.getElementById('var_threshold').value, 10),
                event_delay: parseInt(document.getElementById('event_delay').value, 10),
                blur_kernel: parseInt(document.getElementById('blur_kernel').value, 10)
            };

            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                alert('Сохранено: ' + JSON.stringify(data));
            } catch (e) {
                alert('Ошибка сохранения config: ' + e);
            }
        }

        function updateVideoMode() {
            const mode = document.getElementById('mode').value;
            document.getElementById('video').src = '/video?mode=' + mode + '&_ts=' + Date.now();
        }

        setInterval(fetchStatus, 1000);
        loadConfig();
        fetchStatus();
    </script>
</body>
</html>
